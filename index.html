      (function() {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');

        } catch (e) {}
